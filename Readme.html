<h1 id="start" style="text-align:center">Fried Eggs</h1>

<a href="#instructions">Go to Instructions</a>

<img src="fried-egg.jpg" alt="Fried Eggs" width="400">

<h2>Ingredients</h2>
<ul>
    <li>Eggs — 2</li>
    <li>Butter — 1 tsp</li>
    <li>Salt</li>
</ul>

<h2 id="instructions">Instructions</h2>
<ol>
    <li>Melt the butter.</li>
    <li>Crack the eggs. <strong>Do not break the yolk!</strong></li>
    <li>Cook 3-5 minutes.</li>
    <li>Salt at the end.</li>
</ol>

<a href="#start">Back to top</a>

</body>
